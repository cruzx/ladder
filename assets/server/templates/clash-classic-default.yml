mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

{{ conf | except("proxy-groups", "rules", "mixed-port", "allow-lan", "mode", "log-level", "ipv6", "unified-delay", "tcp-concurrent") | yaml }}

proxy-groups:
  - name: Proxy
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Codex
    type: url-test
    url: https://chatgpt.com
    interval: 300
    proxies:
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: AI
    type: url-test
    url: https://api.openai.com
    interval: 300
    proxies:
      - Codex
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Video
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Streaming
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Social
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Design
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Music
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Automatic
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
{{ proxy_remarks | yaml | indent(6, true) }}
  - name: Final
    type: select
    proxies:
      - DIRECT
      - Codex
      - Automatic

