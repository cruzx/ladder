mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

proxies:
  - name: Codex-SS
    type: ss
    server: __SERVER_IP__
    port: 443
    cipher: chacha20-ietf-poly1305
    password: __SS_PASSWORD__
    udp: true
  - name: Codex-Reality
    type: vless
    server: __SERVER_IP__
    port: 2053
    uuid: __VLESS_UUID__
    network: tcp
    tls: true
    servername: __REALITY_SERVER_NAME__
    client-fingerprint: chrome
    reality-opts:
      public-key: __REALITY_PUBLIC_KEY__
      short-id: __REALITY_SHORT_ID__
    udp: true

proxy-groups:
  - name: Proxy
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Codex-Reality
      - Codex-SS
  - name: Codex
    type: url-test
    url: https://chatgpt.com
    interval: 300
    proxies:
      - Proxy
      - Codex-Reality
      - Codex-SS
  - name: AI
    type: url-test
    url: https://api.openai.com
    interval: 300
    proxies:
      - Codex
      - Proxy
      - Codex-Reality
      - Codex-SS
  - name: Video
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
      - Codex-Reality
      - Codex-SS
  - name: Streaming
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
      - Codex-Reality
      - Codex-SS
  - name: Social
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
      - Codex-Reality
      - Codex-SS
  - name: Design
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
      - Codex-Reality
      - Codex-SS
  - name: Music
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - Proxy
      - Codex-Reality
      - Codex-SS

